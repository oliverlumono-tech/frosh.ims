{% extends "layout.html" %}

{% block content %}

    {% if current_user %}
        <p>Welcome back, {{ current_user }}! <a href="{{ url_for('registrants') }}">View registrants</a></p>
    {% else %}
        <p>Please <a href="{{ url_for('login') }}">log in</a> to view the registrants list.</p>
    {% endif %}

    <h1>Register</h1>
    <form action="/register" method="post">
        <input autocomplete="off" autofocus name="name" placeholder="Name" type="text">
        {% for sport in sports %}
            <input name="sport" type="checkbox" value="{{ sport }}" id="{{ sport }}">
            <label for="{{ sport }}">{{ sport }}</label>
        {% endfor %}
        <button type="submit">Register</button>
    </form>

{% endblock %}
