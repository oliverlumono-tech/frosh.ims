{% extends "layout.html" %}

{% block content %}
    <h1>Log In</h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form action="{{ url_for('login') }}" method="post">
        <input autocomplete="off" autofocus name="username" placeholder="Username" type="text">
        <button type="submit">Log in</button>
    </form>
{% endblock %}
